<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <defs>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c84b31"/>
    </linearGradient>
    <clipPath id="bgClip">
      <rect width="500" height="160" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="160" rx="12" fill="url(#inkGrad)"/>

  <!-- Large tomato, cropped to background, only bottom-right segment visible -->
  <g clip-path="url(#bgClip)" opacity="0.28">
    <circle cx="430" cy="220" r="130" fill="#c0392b"/>
    <circle cx="430" cy="220" r="130" fill="url(#accentGrad)" opacity="0.5"/>
    <!-- highlight -->
    <ellipse cx="360" cy="150" rx="30" ry="20" fill="#ffffff" opacity="0.15" transform="rotate(-20,360,150)"/>
    <!-- stem -->
    <line x1="430" y1="90" x2="430" y2="60" stroke="#2d6a2d" stroke-width="7" stroke-linecap="round"/>
    <!-- leaves -->
    <path d="M430,80 Q465,45 458,22 Q442,52 430,80" fill="#3a8a3a"/>
    <path d="M430,80 Q395,45 402,22 Q418,52 430,80" fill="#2d6a2d"/>
    <path d="M430,72 Q468,30 490,38 Q465,58 430,72" fill="#3a8a3a"/>
    <path d="M430,72 Q392,30 370,38 Q395,58 430,72" fill="#2d6a2d"/>
  </g>

  <!-- Wordmark -->
  <text
    x="62"
    y="105"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    letter-spacing="-2"
    fill="#f0ece2"
  >mato</text>

  <!-- Accent underline bar -->
  <rect x="62" y="116" width="280" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Right side: transformation arrow + labels -->
  <g transform="translate(460, 72)">
    <!-- md label -->
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="13" fill="#a0aec0" text-anchor="middle">.md</text>
    <!-- arrow -->
    <line x1="0" y1="8" x2="0" y2="20" stroke="#e94560" stroke-width="1.5" opacity="0.7"/>
    <polygon points="0,24 -4,16 4,16" fill="#e94560" opacity="0.7"/>
    <!-- pdf label -->
    <text x="0" y="36" font-family="'Courier New', monospace" font-size="13" fill="#a0aec0" text-anchor="middle">.pdf</text>
  </g>

  <!-- Tagline -->
  <text
    x="62"
    y="138"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    fill="#718096"
    letter-spacing="2"
  >MARKDOWN TRANSFORMER</text>
</svg>
